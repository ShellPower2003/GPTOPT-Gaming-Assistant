name: HaloSight Smoke

on:
  pull_request:
    paths:
      - 'HaloSight/**'
      - '.github/workflows/halosight-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HaloSight smoke test
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File HaloSight\tests\smoke_test.ps1
