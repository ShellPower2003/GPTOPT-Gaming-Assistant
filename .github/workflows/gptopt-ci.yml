name: GPTOPT CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate toolkit
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem -Recurse -File -Filter *.ps1 | ForEach-Object {
            Write-Host "Parsing $($_.FullName)"
            $null = [scriptblock]::Create((Get-Content -Raw -LiteralPath $_.FullName))
          }

      - name: Validate JSON files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem -Recurse -File -Filter *.json | ForEach-Object {
            Write-Host "Validating $($_.FullName)"
            $null = Get-Content -Raw -LiteralPath $_.FullName | ConvertFrom-Json
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run strict PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host '[OK] PSScriptAnalyzer found no issues.'

      - name: Run security policy scan
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./tests/security_policy.ps1

      - name: Run HaloSight smoke test
        shell: powershell
        run: |
          if (Test-Path HaloSight\tests\smoke_test.ps1) {
            powershell -NoProfile -ExecutionPolicy Bypass -File HaloSight\tests\smoke_test.ps1
          } elseif (Test-Path tests\smoke_test.ps1) {
            powershell -NoProfile -ExecutionPolicy Bypass -File tests\smoke_test.ps1
          } else {
            throw 'HaloSight smoke_test.ps1 not found.'
          }
